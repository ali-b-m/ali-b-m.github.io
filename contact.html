<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Your Name</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LW3GT7P0EF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LW3GT7P0EF');
  </script>
</head>
<body>

  <!-- ── Navigation ── -->
  <nav>
    <a class="nav-brand" href="index.html">Your Name</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main class="page">

    <div class="section-header">
      <p class="section-label">Say Hello</p>
      <h2 class="section-title">Get in Touch</h2>
      <p class="section-sub">Feel free to reach out — I'm always happy to connect.</p>
    </div>

    <div class="contact-wrapper">

      <!-- Email -->
      <div class="contact-card">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
        <div>
          <p class="contact-label">Email</p>
          <p class="contact-value">
            <a href="mailto:your.email@university.edu">your.email@university.edu</a>
          </p>
        </div>
      </div>

      <!-- Location -->
      <div class="contact-card">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div>
          <p class="contact-label">Location</p>
          <p class="contact-value">City, Country</p>
        </div>
      </div>

      <!-- LinkedIn -->
      <a class="contact-card" href="https://linkedin.com/in/your-profile" target="_blank" rel="noopener" style="text-decoration:none; color:inherit;">
        <div class="contact-icon">
          <!-- LinkedIn icon -->
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </div>
        <div>
          <p class="contact-label">LinkedIn</p>
          <p class="contact-value">linkedin.com/in/your-profile</p>
        </div>
      </a>

      <!-- Optional: Google Scholar or GitHub -->
      <a class="contact-card" href="https://scholar.google.com/citations?user=XXXXX" target="_blank" rel="noopener" style="text-decoration:none; color:inherit;">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <div>
          <p class="contact-label">Google Scholar</p>
          <p class="contact-value">View my publications</p>
        </div>
      </a>

    </div>
  </main>

  <footer>
    &copy; <span id="yr"></span> Your Name
  </footer>

  <script>document.getElementById("yr").textContent = new Date().getFullYear();</script>
</body>
</html>
